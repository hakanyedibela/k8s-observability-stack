# =============================================================================
# Loki Helm Values - Vanilla Kubernetes (RKE2 / kubeadm / k3s)
# Chart: grafana/loki
# =============================================================================

# --- Deployment Mode ---
deploymentMode: SimpleScalable

# --- Loki Config ---
loki:
  auth_enabled: false

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: "${S3_BUCKET_LOKI_CHUNKS}"
      ruler: "${S3_BUCKET_LOKI_RULER}"
      admin: "${S3_BUCKET_LOKI_ADMIN}"
    s3:
      endpoint: "${S3_ENDPOINT}"
      region: "${S3_REGION}"
      secretAccessKey: "${S3_SECRET_KEY}"
      accessKeyId: "${S3_ACCESS_KEY}"
      s3ForcePathStyle: true       # Required for MinIO
      insecure: ${S3_INSECURE}

  limits_config:
    retention_period: 30d
    ingestion_rate_mb: 20
    ingestion_burst_size_mb: 30
    max_query_parallelism: 32
    max_query_series: 5000
    max_entries_limit_per_query: 10000
    max_global_streams_per_user: 10000
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 20MB

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: s3

  querier:
    max_concurrent: 4

  query_scheduler:
    max_outstanding_requests_per_tenant: 2048

  storage_config:
    tsdb_shipper:
      active_index_directory: /var/loki/tsdb-index
      cache_location: /var/loki/tsdb-cache

  allow_structured_metadata: true

# --- Write Path ---
write:
  replicas: 3
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  persistence:
    enabled: true
    storageClass: "${STORAGE_CLASS}"
    size: 20Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# --- Read Path ---
read:
  replicas: 3
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# --- Backend ---
backend:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: "${STORAGE_CLASS}"
    size: 20Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# --- Gateway ---
gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# --- Monitoring ---
monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

# --- Disable test pod ---
test:
  enabled: false

# --- Chunk cache ---
chunksCache:
  enabled: true
  replicas: 1
  allocatedMemory: 2048
  resources:
    requests:
      cpu: 250m
      memory: 2560Mi
    limits:
      cpu: 500m
      memory: 3Gi

# --- Results cache ---
resultsCache:
  enabled: true
  replicas: 1
  allocatedMemory: 1024
  resources:
    requests:
      cpu: 100m
      memory: 1280Mi
    limits:
      cpu: 250m
      memory: 1536Mi
