apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: ci-event-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    # --- GitLab webhook trigger ---
    - name: gitlab-push
      interceptors:
        # Only trigger on push to main branch
        - ref:
            name: "cel"
          params:
            - name: filter
              value: >
                body.ref == 'refs/heads/main' &&
                body.event_name == 'push'
      bindings:
        - ref: gitlab-push-binding
      template:
        ref: ci-pipeline-template

    # --- GitHub webhook trigger (uncomment if using GitHub) ---
