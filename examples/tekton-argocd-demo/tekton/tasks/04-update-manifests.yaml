apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-manifests
  namespace: tekton-pipelines
spec:
  description: |
    Update the image tag in Kustomize overlays and push the change back to Git.
    This is the bridge between Tekton (CI) and ArgoCD (CD) — ArgoCD detects the
    new commit and syncs the deployment.
  params:
    - name: git-url
      type: string
      description: Git repository URL (must be push-able)
    - name: git-revision
      type: string
      default: main
    - name: image-name
      type: string
      description: "Full image name (e.g. registry.gitlab.com/user/demo-app)"
    - name: image-tag
      type: string
      description: "New image tag to set"
    - name: overlay
      type: string
      default: dev
      description: "Kustomize overlay to update (dev or prod)"
  workspaces:
    - name: source
      description: Workspace (will re-clone to get a clean state)
    - name: git-credentials
      description: Secret with username/password for Git push
  steps:
    - name: update-and-push
      image: alpine/git:2.43.0
      script: |
        #!/usr/bin/env sh
        set -eu

        # Read credentials
        GIT_USER=$(cat "$(workspaces.git-credentials.path)/username")
        GIT_PASS=$(cat "$(workspaces.git-credentials.path)/password")

        # Construct authenticated URL
        PROTO=$(echo "$(params.git-url)" | grep -oE '^https?://')
        HOST_PATH=$(echo "$(params.git-url)" | sed "s|${PROTO}||")
        AUTH_URL="${PROTO}${GIT_USER}:${GIT_PASS}@${HOST_PATH}"

        # Fresh clone (we need a pushable working tree)
        WORK_DIR="/tmp/manifest-update"
        rm -rf "$WORK_DIR"
        git clone --depth 1 --branch "$(params.git-revision)" "$AUTH_URL" "$WORK_DIR"
        cd "$WORK_DIR"

        # Update the image tag in the Kustomize overlay
        OVERLAY_FILE="k8s/overlays/$(params.overlay)/kustomization.yaml"

        if [ ! -f "$OVERLAY_FILE" ]; then
          echo "ERROR: $OVERLAY_FILE not found"
          exit 1
        fi

        echo "Updating $OVERLAY_FILE with tag: $(params.image-tag)"

        # Replace the newTag line
        sed -i "s|newTag:.*|newTag: $(params.image-tag)|g" "$OVERLAY_FILE"
        # Replace the newName line (in case registry changed)
        sed -i "s|newName:.*|newName: $(params.image-name)|g" "$OVERLAY_FILE"

        # Commit and push
        git config user.email "tekton@ci.local"
        git config user.name "Tekton CI"
        git add "$OVERLAY_FILE"

        if git diff --cached --quiet; then
          echo "No changes to commit — image tag already up to date."
          exit 0
        fi

        git commit -m "ci: update $(params.overlay) image to $(params.image-name):$(params.image-tag)"
        git push origin "$(params.git-revision)"

        echo "Manifests updated and pushed. ArgoCD will pick up the change."
