apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-pipelines
spec:
  description: Clone a Git repository into the workspace.
  params:
    - name: url
      type: string
      description: Git repository URL
    - name: revision
      type: string
      default: main
      description: Branch, tag, or commit SHA
  results:
    - name: commit-sha
      description: Short SHA of the cloned commit
  workspaces:
    - name: output
      description: The cloned repo will be placed here
  steps:
    - name: clone
      image: alpine/git:2.43.0
      script: |
        #!/usr/bin/env sh
        set -eu
        echo "Cloning $(params.url) @ $(params.revision)"
        git clone --depth 1 --branch "$(params.revision)" "$(params.url)" "$(workspaces.output.path)/source"
        cd "$(workspaces.output.path)/source"
        COMMIT=$(git rev-parse --short HEAD)
        echo -n "$COMMIT" > "$(workspaces.output.path)/commit-sha"
        echo -n "$COMMIT" > "$(results.commit-sha.path)"
        echo "Cloned at commit: $COMMIT"
