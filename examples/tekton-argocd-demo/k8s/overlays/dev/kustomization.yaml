apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-dev

resources:
  - ../../base

# Tekton updates this image tag after each successful build
images:
  - name: REGISTRY/USERNAME/demo-app
    newName: REGISTRY/USERNAME/demo-app  # Replace with your registry
    newTag: latest                        # Tekton overwrites this

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: demo-app
      spec:
        replicas: 1
  - patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: demo-app
      spec:
        minReplicas: 1
        maxReplicas: 3
